name: Deploy to SiteGround

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 18765 ssh.neelamg.sg-host.com >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p 18765 -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            ./ u2842-rygsrjj4ondp@ssh.neelamg.sg-host.com:/home/u2842-rygsrjj4ondp/www/neelamg.sg-host.com/public_html/

      - name: Run Composer
        run: |
          ssh -i ~/.ssh/deploy_key -p 18765 -o StrictHostKeyChecking=no \
            u2842-rygsrjj4ondp@ssh.neelamg.sg-host.com \
            "cd /home/u2842-rygsrjj4ondp/www/neelamg.sg-host.com/public_html && \
            php -r \"copy('https://getcomposer.org/installer', 'composer-setup.php');\" && \
            php composer-setup.php && \
            php composer.phar install --no-dev --optimize-autoloader && \
            php artisan key:generate --force && \
            php artisan config:cache && \
            php artisan migrate --force"
