name: Deploy to SiteGround

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SG_SSH_HOST || secrets.REMOTE_HOST }}
      SSH_PORT: ${{ secrets.SG_SSH_PORT }}
      SSH_USER: ${{ secrets.SG_SSH_USER || secrets.REMOTE_USER }}
      DEPLOY_PATH: ${{ secrets.SG_DEPLOY_PATH }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          test -n "$SSH_HOST" || { echo "Missing secret: SG_SSH_HOST"; exit 1; }
          test -n "$SSH_PORT" || { echo "Missing secret: SG_SSH_PORT"; exit 1; }
          test -n "$SSH_USER" || { echo "Missing secret: SG_SSH_USER"; exit 1; }
          test -n "$DEPLOY_PATH" || { echo "Missing secret: SG_DEPLOY_PATH"; exit 1; }

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Run Composer
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=no \
            "$SSH_USER@$SSH_HOST" \
            "cd $DEPLOY_PATH && \
            php -r \"copy('https://getcomposer.org/installer', 'composer-setup.php');\" && \
            php composer-setup.php && \
            php composer.phar install --no-dev --optimize-autoloader && \
            php artisan optimize:clear && \
            php artisan config:cache && \
            php artisan migrate --force"
