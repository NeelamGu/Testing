<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feature Preview</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f6f7f9;
      color: #1f2937;
    }

    .wrap {
      max-width: 760px;
      margin: 64px auto;
      padding: 0 20px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    p {
      line-height: 1.6;
    }

    .links {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    a {
      display: inline-block;
      text-decoration: none;
      background: #111827;
      color: #ffffff;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Feature Preview</h1>
      <p>
        This Vercel deployment is intentionally limited to previewing the new user panel and translation functionality.
      </p>
      <p>
        Other pages are hidden in this preview build to keep feedback focused on the requested website changes.
      </p>
      <div class="links">
        <a href="/preview/translation">Open translation preview</a>
        <a href="/preview/user-panel">Open user panel preview</a>
      </div>
    </div>
  </div>
</body>
</html>
